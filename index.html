<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My First 3D Web Page</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div id="container"></div>
        
        <!-- POPUP ELEMENT FOR CLICKABLE OBJECTS -->
        <div id="popup">
            <div id="popup-header">
                <h2 id="popup-title">Object Title</h2>
                <button id="popup-close">&times;</button>
            </div>
            <p id="popup-description">                     </p>  <!-- Update depend on the object selected -->
            <a id="popup-link" href="#" target="_blank">Learn More</a>
        </div>
        
        <script type="module" src="main.js"></script>
    </body>
</html>
